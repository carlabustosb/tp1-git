name: Validacion de HTML

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  html-validation:
    name: Validar Estructura HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Validar archivos HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .